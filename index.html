<!DOCTYPE html>
<html lang="en" data-theme="dark" style="height: 100%;">
<head>
  <meta charset="utf-g">
  <title>Babylon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- JetBrains Mono Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            // Inter for UI text; Mono reserved for financial data
            sans: ['Inter', 'system-ui', 'sans-serif'],
            // JetBrains Mono for prices, percentages, P&L, dates, IDs
            mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
          },
          colors: {
            // Babylon design tokens — CSS custom properties from @babylon/tokens
            accent: 'var(--color-accent)',
            'accent-hover': 'var(--color-accent-hover)',
            gain: 'var(--color-gain)',
            loss: 'var(--color-loss)',
            warning: 'var(--color-warning)',
            info: 'var(--color-info)',
            bg: {
              base: 'var(--color-bg-base)',
              surface: 'var(--color-bg-surface)',
              elevated: 'var(--color-bg-elevated)',
            },
            text: {
              primary: 'var(--color-text-primary)',
              secondary: 'var(--color-text-secondary)',
              muted: 'var(--color-text-muted)',
              ghost: 'var(--color-text-ghost)',
            },
            border: {
              DEFAULT: 'var(--color-border)',
              strong: 'var(--color-border-strong)',
            },
          },
          borderRadius: {
            sm: 'var(--radius-sm)',
            md: 'var(--radius-md)',
            lg: 'var(--radius-lg)',
          },
          spacing: {
            1: 'var(--space-1)',
            2: 'var(--space-2)',
            3: 'var(--space-3)',
            4: 'var(--space-4)',
            6: 'var(--space-6)',
            8: 'var(--space-8)',
            12: 'var(--space-12)',
            16: 'var(--space-16)',
          },
        },
      },
    };
  </script>
  <style>
    /* Global Terminal Chic Styles */
    html {
      font-size: 14px; /* Reduced from default 16px */
    }
    
    html, body {
      font-family: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, Monaco, Consolas, monospace;
      color: #111827;
      background-color: white;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.015em;
      font-size: 0.875rem; /* 14px base */
    }

    /* Make inputs, textareas, and selects feel like code editors */
    input, textarea, select {
      font-weight: 500;
      font-size: 0.875rem; /* 14px */
    }

    /* Hide browser spinners on number inputs */
    /* Chrome, Safari, Edge, Opera */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    /* Firefox */
    input[type=number] {
      -moz-appearance: textfield;
    }

    /* Fade animation for carousel */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "rxjs": "https://aistudiocdn.com/rxjs@^7.8.2?conditions=es2015",
    "rxjs/operators": "https://aistudiocdn.com/rxjs@^7.8.2/operators?conditions=es2015",
    "rxjs/ajax": "https://aistudiocdn.com/rxjs@^7.8.2/ajax?conditions=es2015",
    "rxjs/webSocket": "https://aistudiocdn.com/rxjs@^7.8.2/webSocket?conditions=es2015",
    "rxjs/testing": "https://aistudiocdn.com/rxjs@^7.8.2/testing?conditions=es2015",
    "rxjs/fetch": "https://aistudiocdn.com/rxjs@^7.8.2/fetch?conditions=es2015",
    "@angular/common": "https://next.esm.sh/@angular/common@^20.3.10?external=rxjs",
    "@angular/platform-browser": "https://next.esm.sh/@angular/platform-browser@^20.3.10?external=rxjs",
    "@angular/compiler": "https://next.esm.sh/@angular/compiler@^20.3.10?external=rxjs",
    "@angular/core": "https://next.esm.sh/@angular/core@^20.3.10?external=rxjs",
    "@angular/forms": "https://next.esm.sh/@angular/forms@^20.3.10?external=rxjs",
    "@angular/router": "https://next.esm.sh/@angular/router@^20.3.10?external=rxjs",
    "@angular/core/rxjs-interop": "https://next.esm.sh/@angular/core@^20.3.10/rxjs-interop?external=rxjs"
  }
}
</script>
</head>
<body class="bg-gray-50" style="height: 100%; margin: 0; padding: 0; overflow: hidden;">
  <app-root></app-root>
</body>
</html>
